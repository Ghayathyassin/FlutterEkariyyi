name: flutter_application_1
description: "A new Flutter project."

version: 1.0.0+1

environment:
  sdk: '>=3.4.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  provider: ^5.0.0
  http: ^0.13.3
  flutter_localizations:
    sdk: flutter
  intl: any  
  font_awesome_flutter: '>=10.7.0 <10.9.0'  # 10.9.0+ needs Flutter 3.27 (uses Color.withValues)
  firebase_core: ^3.1.1
  firebase_messaging: ^15.0.2
  auto_size_text: ^3.0.0
  shared_preferences: ^2.2.3
  flutter_cache_manager: ^3.3.1
  flutter_secure_storage: ^9.2.2
  flutter_dotenv: ^5.1.0
  url_launcher: ^6.3.0
  logger: ^2.0.2
  googleapis: ^13.1.0
  googleapis_auth: ^1.4.1
  flutter_local_notifications: ^17.2.3


dev_dependencies:
  intl_utils: ^2.6.4
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  generate: true  
  uses-material-design: true
   
  fonts:
    - family: Segoe UI
      fonts:
        - asset: assets/fonts/Segoe_UI.ttf
        - asset: assets/fonts/Segoe_UI_Bold.ttf
        - asset: assets/fonts/Segoe_UI_Italic.ttf
        - asset: assets/fonts/Segoe_UI_Bold_Italic.ttf

  assets:
    - assets/images/logo.png
    - assets/images/logoHeader.png
    - assets/images/logoMain.png
    - .env
 

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/appstore.png"
  min_sdk_android: 21 
  web:
    generate: true
    image_path: "path/to/image.png"
    background_color: "#hexcode"
    theme_color: "#hexcode"
  windows:
    generate: true
    image_path: "path/to/image.png"
    icon_size: 48 
  macos:
    generate: true
    image_path: "path/to/image.png" 
 


  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/assets-and-images/#resolution-aware

# For details regarding adding assets from package dependencies, see
# https://flutter.dev/assets-and-images/#from-packages

